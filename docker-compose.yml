services:
  meilisearch:
    image: getmeili/meilisearch:v1.10
    container_name: brickbase-meilisearch
    restart: unless-stopped
    ports:
      - '7700:7700'
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-brickbase-dev-master-key}
      MEILI_ENV: development
    volumes:
      - meilisearch-data:/meili_data

volumes:
  meilisearch-data:
