services:
  - type: web
    name: brickbase-api
    runtime: node
    rootDir: backend
    plan: free
    # --include=dev is required even though NODE_ENV=production is set below — npm skips
    # devDependencies (typescript included) when NODE_ENV=production, which would otherwise
    # fall back to whatever tsc ships on the base image instead of our pinned version.
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: FRONTEND_ORIGIN
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: MEILISEARCH_HOST
        sync: false
      - key: MEILI_MASTER_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_API_BASE
        value: https://api.groq.com/openai/v1
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
